<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velox Solar - Plataforma de Energia Solar</title>
    <meta http-equiv="refresh" content="0;url=backoffice/login.html">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0A1929 0%, #0F2A4A 50%, #1E3A5F 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .loader-container { text-align: center; }
        .loader-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #F59E0B, #EF6C00);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px;
            font-size: 2rem;
            animation: pulse 1.5s ease-in-out infinite;
            box-shadow: 0 10px 40px rgba(245,158,11,0.3);
        }
        h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; }
        h1 span { color: #F59E0B; }
        p { color: rgba(255,255,255,0.6); font-size: 0.875rem; }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: #F59E0B;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 24px auto 0;
        }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        @keyframes spin { to{transform:rotate(360deg)} }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="loader-icon">☀️</div>
        <h1>Velox <span>Solar</span></h1>
        <p>Carregando plataforma...</p>
        <div class="spinner"></div>
    </div>
    <script>
        setTimeout(function() {
            window.location.href = 'backoffice/login.html';
        }, 1500);
    </script>
</body>
</html>
